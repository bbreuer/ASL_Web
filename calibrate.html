<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0e0e10">
    <title>Calibrate ASL Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Calibration</h1>
        <a href="index.html" class="back-link">← Back</a>
    </header>
    <main>
        <div class="cal-letter-row">
            <span id="letter">A</span>
            <span id="counter">1 / 24</span>
        </div>
        <p id="hint">Hint goes here.</p>

        <div class="compare-pane">
            <div class="ref-img-wrap">
                <img id="sign-img" alt="" class="missing">
            </div>
            <div class="video-wrap">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="overlay"></canvas>
            </div>
        </div>
        <div id="progress-bar"><div id="progress"></div></div>
        <div id="status">Starting…</div>

        <div class="controls">
            <button id="btn-back">Back</button>
            <button id="btn-record" class="primary">Record</button>
            <button id="btn-skip">Skip</button>
        </div>
        <div class="controls secondary">
            <button id="btn-finish">Done</button>
            <button id="btn-clear-all">Erase all</button>
        </div>
    </main>
    <script type="module" src="calibrate.js"></script>
</body>
</html>
